description: |
  This is the third round of selection for the Chinese IPhO team. This round of selection is followed by the team selection test, which is confidential and often contains problems from higher physics (analytical mechanics, advanced electrodynamics, quantum mechanics and statistical mechanics). Many of the files here are Word documents, but I will be converting them to pdfs in the near future for easier web viewing.
